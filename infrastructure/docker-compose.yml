# Mockingbird — local development stack (CPU-only, no GPU).
#
# Postgres + Redis plus the three app services (inference, gateway, frontend),
# each built from its own Dockerfile. Inference uses Cartesia by default and reads
# CARTESIA_API_KEY from ../inference/.env; override with INFERENCE_BACKEND=passthrough.
#
#   docker compose -f infrastructure/docker-compose.yml up --build
#   # then open http://localhost:3000/studio
#
# All published ports bind to 127.0.0.1: this is a dev stack (dev credentials,
# unauthenticated Redis, anonymous-admin Grafana) and must not be reachable
# from the LAN. Inter-service traffic uses the compose network, not these.
#
# Compose v2 ignores the legacy top-level `version:` key, so it is omitted.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: mockingbird
      POSTGRES_USER: mockingbird
      POSTGRES_PASSWORD: dev_password
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mockingbird"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- Application services (built from each service's Dockerfile) -----------

  inference:
    build: ../inference
    environment:
      INFERENCE_BACKEND: ${INFERENCE_BACKEND:-cartesia}
    env_file:
      - path: ../inference/.env
        required: false
    ports:
      - "127.0.0.1:8001:8001"    # HTTP clone / health
      - "127.0.0.1:50051:50051"  # gRPC audio stream
    depends_on:
      postgres:
        condition: service_healthy

  # One-shot: apply gateway migrations before the gateway serves.
  gateway-migrate:
    build: ../gateway
    command: ["uv", "run", "--no-sync", "alembic", "upgrade", "head"]
    environment:
      DATABASE_URL: postgresql+asyncpg://mockingbird:dev_password@postgres:5432/mockingbird
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  gateway:
    build: ../gateway
    environment:
      DATABASE_URL: postgresql+asyncpg://mockingbird:dev_password@postgres:5432/mockingbird
      REDIS_URL: redis://redis:6379
      INFERENCE_GRPC_URL: inference:50051
      INFERENCE_SERVICE_URL: http://inference:8001
    ports:
      - "127.0.0.1:3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      gateway-migrate:
        condition: service_completed_successfully
      inference:
        condition: service_started

  frontend:
    build: ../frontend
    # PUBLIC_ urls are browser-facing, so they point at the host-mapped ports,
    # not the internal service names.
    environment:
      PUBLIC_WS_URL: ws://localhost:3001/ws/voice
      PUBLIC_GATEWAY_URL: http://localhost:3001
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      gateway:
        condition: service_started

  # --- Observability (M7): Prometheus scrape + Grafana latency dashboard ----
  # Optional for the app itself — the stack runs fine if these two are stopped.
  # Grafana: http://localhost:3002/d/mockingbird-latency (anonymous admin, dev only).

  prometheus:
    image: prom/prometheus:v3.1.0
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "127.0.0.1:9090:9090"
    depends_on:
      gateway:
        condition: service_started
      inference:
        condition: service_started

  grafana:
    image: grafana/grafana:11.4.0
    # Dev-only: anonymous admin, no login wall. Do not ship this config.
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    # Frontend owns host port 3000; Grafana maps to 3002.
    ports:
      - "127.0.0.1:3002:3000"
    depends_on:
      prometheus:
        condition: service_started

volumes:
  postgres_data:
  redis_data:
